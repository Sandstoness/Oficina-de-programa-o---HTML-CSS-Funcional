<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }

    .container {
      display: flex;
      max-width: 1000px;
      margin: 40px auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      gap: 20px;
    }

    .imagem img {
      width: 300px;
      border-radius: 10px;
    }

    .info {
      flex: 1;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .preco {
      color: #ff6600;
      font-size: 28px;
      margin: 10px 0;
    }

    .botao {
      display: inline-block;
      padding: 12px 20px;
      background: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      margin-top: 15px;
    }

    .botao:hover {
      background: #0056b3;
    }

    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="imagem">
    <img src="image.png" alt="Produto">
  </div>

  <div class="info">
    <div class="titulo">
      Iphone 13
    </div>

    <div class="preco">
      R$ 200,99
    </div>

    <p>À vista no PIX com desconto</p>

    <h3>Descrição:</h3>
    <ul>
      <li>Tela 6.7"</li>
      <li>Câmera 50MP</li>
      <li>8GB RAM</li>
      <li>Bateria 5000mAh</li>
    </ul>

    <a href="compra.html" class="botao">Comprar agora</a>
  </div>
</div>

</body>
</html>
