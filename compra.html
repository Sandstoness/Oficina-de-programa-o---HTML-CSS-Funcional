<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar compra</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "DM Sans", system-ui, sans-serif;
            color: #0f172a;
            background: linear-gradient(165deg, #e8eef5 0%, #dce4ee 40%, #eef2f7 100%);
            padding: 24px 16px 40px;
        }

        .page {
            max-width: 520px;
            margin: 0 auto;
           
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 16px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #2563eb;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
        }

        .back:hover {
            color: #1d4ed8;
            transform: translateX(-2px);
        }

        .container {
            padding: 32px 28px 28px;
            background: #fff;
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow:
                0 4px 6px -1px rgba(15, 23, 42, 0.06),
                0 20px 40px -12px rgba(15, 23, 42, 0.14);
        }

        .head {
            text-align: center;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #e2e8f0;
        }

        .head h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #0f172a;
        }

        .head p {
            margin: 0;
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .section {
            margin-bottom: 22px;
        }

        .section-title {
            margin: 0 0 12px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #94a3b8;
        }

        .field {
            margin-bottom: 14px;
        }

        .field:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #334155;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            font-family: inherit;
            font-size: 0.95rem;
            color: #0f172a;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:hover {
            background: #fff;
            border-color: #cbd5e1;
        }

        input:focus {
            background: #fff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 14px 18px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            color: #fff;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .btn:hover {
            filter: brightness(1.05);
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.4);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .warning {
            margin-top: 16px;
            padding: 12px 14px;
            font-size: 0.8rem;
            line-height: 1.45;
            text-align: center;
            color: #9a3412;
            background: #fff7ed;
            border: 1px solid rgba(251, 146, 60, 0.35);
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="page">
    <a class="back" href="loja.html">← Voltar à loja</a>

    <div class="container">
        <header class="head">
            <h1>🧾 Finalizar compra</h1>
            <p>Preencha os dados abaixo para concluir o pedido.</p>
        </header>

        <div class="section">
            <h2 class="section-title">Contato</h2>
            <div class="field">
                <label for="nome">Nome completo</label>
                <input id="nome" type="text" placeholder="Como no documento" autocomplete="name">
            </div>
            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
            </div>
            <div class="field">
                <label for="cpf">CPF</label>
                <input id="cpf" type="text" placeholder="000.000.000-00" inputmode="numeric" autocomplete="off">
            </div>
            <div class="field">
                <label for="tel">Telefone</label>
                <input id="tel" type="tel" placeholder="(00) 00000-0000" autocomplete="tel">
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Entrega</h2>
            <div class="field">
                <label for="endereco">Endereço completo</label>
                <input id="endereco" type="text" placeholder="Rua, número, bairro, cidade" autocomplete="street-address">
            </div>
            <div class="field">
                <label for="cep">CEP</label>
                <input id="cep" type="text" placeholder="00000-000" inputmode="numeric" autocomplete="postal-code">
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">Pagamento</h2>
            <div class="field">
                <label for="cartao">Número do cartão</label>
                <input id="cartao" type="text" placeholder="0000 0000 0000 0000" inputmode="numeric" autocomplete="cc-number">
            </div>
            <div class="field">
                <label for="rg">RG</label>
                <input id="rg" type="text" placeholder="Documento de identidade" autocomplete="off">
            </div>
        </div>

        <button type="button" class="btn" onclick="alert('Erro. Coloque Outro Cartão De Credito Esse Esta Invalido!')">
            Confirmar compra
        </button>

    </div>
</div>

</body>
</html>
